<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커피사업본부 회의록</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f6f4ef;
      color: #2c2c2c;
    }

    .hidden { display: none !important; }

    .screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
      padding: 24px;
    }

    .login-box {
      max-width: 420px;
      text-align: center;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 10px;
      color: #3c2f2f;
    }

    .subtitle {
      margin: 0 0 22px;
      color: #6b6b6b;
      line-height: 1.5;
    }

    input, textarea, select, button {
      font: inherit;
    }

    .input, .textarea, .select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d9d4cb;
      background: #fff;
      outline: none;
    }

    .textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.6;
    }

    .input:focus, .textarea:focus, .select:focus {
      border-color: #8b6f47;
      box-shadow: 0 0 0 3px rgba(139,111,71,0.12);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #6f4e37;
      color: #fff;
    }

    .btn-secondary {
      background: #efe8dc;
      color: #4b3a2f;
    }

    .btn-danger {
      background: #c94f4f;
      color: #fff;
    }

    .btn-success {
      background: #4f8a5b;
      color: #fff;
    }

    .btn-gray {
      background: #ddd;
      color: #333;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toolbar-left, .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 14px;
      color: #3c2f2f;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #5b4b3f;
    }

    .panel {
      background: #faf8f4;
      border: 1px solid #ece5d8;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .posts {
      display: grid;
      gap: 14px;
    }

    .post {
      border: 1px solid #e8e1d6;
      border-radius: 16px;
      padding: 18px;
      background: #fff;
    }

    .post-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .post-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 6px;
      color: #3b2c24;
    }

    .meta {
      font-size: 13px;
      color: #7a7a7a;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eee5d7;
      color: #5a4738;
      font-size: 12px;
      font-weight: 700;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .post-content {
      line-height: 1.7;
      white-space: pre-wrap;
      margin-top: 8px;
    }

    .file-preview {
      margin-top: 14px;
    }

    audio, img, iframe {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
    }

    iframe {
      height: 420px;
      border: 1px solid #ddd;
      background: #fff;
    }

    .post-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .empty {
      text-align: center;
      padding: 30px 16px;
      color: #777;
      border: 1px dashed #d7cfc0;
      border-radius: 16px;
      background: #fff;
    }

    .record-status {
      font-size: 14px;
      font-weight: 700;
      color: #6f4e37;
      margin-top: 8px;
    }

    .search-box {
      min-width: 220px;
    }

    .small-note {
      font-size: 13px;
      color: #7a7a7a;
      line-height: 1.5;
      margin-top: 8px;
    }

    .comments-wrap {
      margin-top: 14px;
      border-top: 1px dashed #d7cfc0;
      padding-top: 14px;
    }

    .comment-form {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .comments-list {
      display: grid;
      gap: 10px;
    }

    .comment-item {
      border: 1px solid #ece5d8;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .comment-meta {
      font-size: 12px;
      color: #7a7a7a;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .comment-content {
      margin-top: 8px;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .comment-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn-sm {
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 10px;
    }

    .top-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }

    .top-title h1 {
      margin: 0;
      font-size: 30px;
      color: #3c2f2f;
    }

    .edit-mode {
      border: 2px solid #caa66b;
      background: #fffdf8;
    }

    @media (max-width: 800px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .top-title h1 {
        font-size: 24px;
      }

      .title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <!-- 로그인 화면 -->
  <section id="loginScreen" class="screen">
    <div class="card login-box">
      <h1 class="title">커피사업본부 회의록</h1>
      <p class="subtitle">
        숫자 비밀번호를 입력하면 회의록 게시판에 입장할 수 있습니다.
      </p>

      <input
        id="passwordInput"
        class="input"
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="숫자 비밀번호 입력"
      />
      <div style="height: 12px;"></div>
      <button class="btn btn-primary" id="loginBtn">입장하기</button>
      <p class="small-note">
        ※ 이 예시는 HTML 단독 버전이라 비밀번호가 코드 안에 들어있습니다.  
        실제 운영용 보안은 서버 방식이 필요합니다.
      </p>
    </div>
  </section>

  <!-- 메인 화면 -->
  <section id="appScreen" class="hidden">
    <div class="screen" style="align-items: flex-start;">
      <div class="card">
        <div class="top-title">
          <h1>커피사업본부 회의록</h1>
          <div class="toolbar-right">
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end;">
              <input
                id="adminPasswordInput"
                class="input"
                type="password"
                placeholder="관리자 비번"
                style="width:160px;"
              />
              <button class="btn btn-secondary" id="adminLoginBtn">관리자모드</button>
            <button class="btn btn-secondary" id="logoutBtn">로그아웃</button>
            </div>
          </div>
        </div>

        <div class="toolbar">
          <div class="toolbar-left">
            <input id="searchInput" class="input search-box" type="text" placeholder="회의 날짜, 참석자, 안건, 결정 검색" />
            <select id="filterType" class="select">
              <option value="all">전체</option>
              <option value="record">녹음</option>
              <option value="file">회의록(파일)</option>
              <option value="etc">기타</option>
            </select>
          </div>
          <div class="toolbar-right">
            <button class="btn btn-primary" id="newPostBtn">새 글 작성</button>
          </div>
        </div>

        <!-- 작성/수정 폼 -->
        <div id="editorPanel" class="panel hidden">
          <h2 class="section-title" id="editorTitle">회의록 작성</h2>

          <div class="form-grid">
            <div>
              <label class="label" for="postType">구분</label>
              <select id="postType" class="select">
                <option value="record">녹음</option>
                <option value="file">회의록(파일)</option>
                <option value="etc">기타</option>
              </select>
            </div>

            <div>
              <label class="label" for="authorInput">참석자</label>
              <input id="authorInput" class="input" type="text" placeholder="예: 김철수, 이영희" />
            </div>

            <div class="full">
              <label class="label" for="titleInput">회의 날짜</label>
              <input id="titleInput" class="input" type="date" />
            </div>

            <div class="full">
              <label class="label" for="contentInput">안건</label>
              <textarea id="contentInput" class="textarea" placeholder="안건 내용을 입력하세요."></textarea>
            </div>

            <div class="full">
              <label class="label" for="decisionsInput">결정 사항</label>
              <textarea id="decisionsInput" class="textarea" placeholder="결정/액션 아이템을 입력하세요."></textarea>
            </div>

            <div id="fileSection" class="full hidden">
              <label class="label">파일 업로드</label>
              <input id="fileInput" class="input" type="file" accept="audio/*,image/*,.pdf,application/pdf" />
              <div class="small-note">
                오디오 / 이미지 / PDF 업로드 가능
              </div>
            </div>

            <div id="recordSection" class="full hidden">
              <label class="label">브라우저 녹음 기능</label>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button type="button" class="btn btn-success" id="startRecordBtn">녹음 시작</button>
                <button type="button" class="btn btn-danger" id="stopRecordBtn" disabled>녹음 종료</button>
                <button type="button" class="btn btn-gray" id="clearRecordedBtn">녹음 삭제</button>
              </div>
              <div id="recordStatus" class="record-status">대기 중</div>
              <audio id="recordedPreview" controls class="hidden"></audio>
              <div class="small-note">
                일부 아이폰/브라우저에서는 녹음 제한이 있을 수 있습니다. 그 경우 녹음 앱으로 만든 파일을 업로드하세요.
              </div>
            </div>
          </div>

          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:18px;">
            <button class="btn btn-primary" id="saveBtn">저장하기</button>
            <button class="btn btn-secondary" id="cancelBtn">취소</button>
          </div>
        </div>

        <!-- 게시글 목록 -->
        <div>
          <h2 class="section-title">회의록 목록</h2>
          <div id="postsContainer" class="posts"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Firebase SDK (Realtime Database) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    // =========================
    // 설정
    // =========================
    const USER_PASSWORD = "1234";
    const ADMIN_PASSWORD = "admin";

    // 세션 기준으로 인증(탭/새로고침 시 다시 입력)
    const USER_AUTH_KEY = "coffee_meeting_board_user_auth";
    const ADMIN_AUTH_KEY = "coffee_meeting_board_admin_auth";

    // 댓글 작성/수정 권한 판단을 위한 "현재 사용자 이름"
    const VIEWER_AUTHOR_KEY = "coffee_meeting_board_viewer_author";

    // 작성자(소유자) 판별을 위한 세션 고유 ID
    // (작성자 이름만으로는 서로 이름을 맞춰서 악용할 수 있어, 실제 소유자는 creatorId로 판별)
    const VIEWER_USER_ID_KEY = "coffee_meeting_board_viewer_user_id";

    // =========================
    // Firebase (Realtime Database)
    // =========================
    const firebaseConfig = {
      apiKey: "AIzaSyCbfJE5nHnDf60-Q5Pq8np7yetpO50p9u4",
      authDomain: "redord-coffee.firebaseapp.com",
      databaseURL: "https://redord-coffee-default-rtdb.firebaseio.com",
      projectId: "redord-coffee",
      storageBucket: "redord-coffee.firebasestorage.app",
      messagingSenderId: "513446129157",
      appId: "1:513446129157:web:d3a09818be86dda8db766c",
      measurementId: "G-89LEJPHMPF"
    };

    const FIREBASE_PATH = "meetingMinutes"; // Firebase RTDB 경로
    let minutesRef = null;
    let firebaseRealtimeInited = false;

    // =========================
    // 요소
    // =========================
    const loginScreen = document.getElementById("loginScreen");
    const appScreen = document.getElementById("appScreen");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const adminPasswordInput = document.getElementById("adminPasswordInput");
    const adminLoginBtn = document.getElementById("adminLoginBtn");

    const newPostBtn = document.getElementById("newPostBtn");
    const editorPanel = document.getElementById("editorPanel");
    const editorTitle = document.getElementById("editorTitle");
    const postType = document.getElementById("postType");
    const authorInput = document.getElementById("authorInput");
    const titleInput = document.getElementById("titleInput");
    const contentInput = document.getElementById("contentInput");
    const decisionsInput = document.getElementById("decisionsInput");
    const fileSection = document.getElementById("fileSection");
    const recordSection = document.getElementById("recordSection");
    const fileInput = document.getElementById("fileInput");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const postsContainer = document.getElementById("postsContainer");
    const searchInput = document.getElementById("searchInput");
    const filterType = document.getElementById("filterType");

    const startRecordBtn = document.getElementById("startRecordBtn");
    const stopRecordBtn = document.getElementById("stopRecordBtn");
    const clearRecordedBtn = document.getElementById("clearRecordedBtn");
    const recordStatus = document.getElementById("recordStatus");
    const recordedPreview = document.getElementById("recordedPreview");

    // =========================
    // 상태
    // =========================
    let posts = [];
    let editingId = null;

    let adminMode = false;
    let viewerAuthor = sessionStorage.getItem(VIEWER_AUTHOR_KEY) || "";
    let viewerUserId = sessionStorage.getItem(VIEWER_USER_ID_KEY) || "";

    let mediaRecorder = null;
    let recordedChunks = [];
    let recordedFileData = null; // {name, type, dataUrl}

    // 녹음 진행 시간 표시
    let recordTimerInterval = null;
    let recordStartTs = 0;
    let recordDurationMs = 0;

    // 댓글 리스너 중복 방지를 위한 캐시
    const commentListeners = {};
    const lastCommentsByPostId = {};

    // =========================
    // 로그인
    // =========================
    function checkLoginState() {
      const authed = sessionStorage.getItem(USER_AUTH_KEY);
      if (authed === "true") {
        showApp();
      } else {
        showLogin();
      }
    }

    function showLogin() {
      loginScreen.classList.remove("hidden");
      appScreen.classList.add("hidden");
    }

    function showApp() {
      loginScreen.classList.add("hidden");
      appScreen.classList.remove("hidden");
      adminMode = sessionStorage.getItem(ADMIN_AUTH_KEY) === "true";
      viewerUserId = ensureViewerUserId();
      refreshAdminModeUI();
      initFirebaseRealtimeIfNeeded();
    }

    function ensureViewerUserId() {
      let id = sessionStorage.getItem(VIEWER_USER_ID_KEY);
      if (id) return id;

      try {
        if (window.crypto && window.crypto.randomUUID) {
          id = window.crypto.randomUUID();
        } else {
          id = `u_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        }
      } catch (e) {
        id = `u_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      }

      sessionStorage.setItem(VIEWER_USER_ID_KEY, id);
      return id;
    }

    function refreshAdminModeUI() {
      // 관리자 버튼/입력 표시를 간단히 반영
      if (adminMode) {
        adminPasswordInput.value = "";
        adminLoginBtn.textContent = "관리자 ON";
        adminLoginBtn.disabled = true;
      } else {
        adminLoginBtn.textContent = "관리자모드";
        adminLoginBtn.disabled = false;
      }
    }

    function initFirebaseRealtimeIfNeeded() {
      if (firebaseRealtimeInited) return;
      firebaseRealtimeInited = true;

      // compat SDK 로드가 안 된 경우를 대비
      if (!window.firebase) {
        console.error("Firebase SDK가 로드되지 않았습니다.");
        postsContainer.innerHTML = `
          <div class="empty">
            Firebase SDK를 불러오지 못했습니다.
          </div>
        `;
        return;
      }

      if (!firebase.apps || firebase.apps.length === 0) {
        firebase.initializeApp(firebaseConfig);
      }

      const db = firebase.database();
      minutesRef = db.ref(FIREBASE_PATH);

      postsContainer.innerHTML = `
        <div class="empty">
          실시간 로딩 중...
        </div>
      `;

      minutesRef
        .orderByChild("createdAt")
        .limitToLast(300)
        .on(
          "value",
          (snapshot) => {
            const raw = snapshot.val() || {};
            posts = Object.entries(raw).map(([id, value]) => ({ id, ...value }));

            const toMillis = (v) => {
              if (typeof v === "number") return v;
              if (!v) return 0;
              const t = new Date(v).getTime();
              return Number.isNaN(t) ? 0 : t;
            };

            posts.sort((a, b) => toMillis(b.createdAt) - toMillis(a.createdAt));
            renderPosts();
          },
          (error) => {
            console.error("Firebase listen error:", error);
            postsContainer.innerHTML = `
              <div class="empty">
                Firebase에서 데이터를 불러오지 못했습니다.
              </div>
            `;
          }
        );
    }

    loginBtn.addEventListener("click", () => {
      const value = passwordInput.value.trim();
      if (value === USER_PASSWORD) {
        sessionStorage.setItem(USER_AUTH_KEY, "true");
        showApp();
      } else {
        alert("비밀번호가 올바르지 않습니다.");
      }
    });

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });

    logoutBtn.addEventListener("click", () => {
      sessionStorage.removeItem(USER_AUTH_KEY);
      sessionStorage.removeItem(ADMIN_AUTH_KEY);
      showLogin();
    });

    adminLoginBtn.addEventListener("click", () => {
      const value = adminPasswordInput.value.trim();
      if (!value) {
        alert("관리자 비밀번호를 입력해주세요.");
        return;
      }

      if (value === ADMIN_PASSWORD) {
        sessionStorage.setItem(ADMIN_AUTH_KEY, "true");
        adminMode = true;
        adminPasswordInput.value = "";
        refreshAdminModeUI();
        renderPosts(); // 관리자 권한 버튼/댓글 수정 삭제 버튼 반영
        refreshAllCommentsUI();
      } else {
        alert("관리자 비밀번호가 올바르지 않습니다.");
      }
    });

    // =========================
    // 에디터 열기/닫기
    // =========================
    newPostBtn.addEventListener("click", () => {
      openEditor();
    });

    cancelBtn.addEventListener("click", () => {
      closeEditor();
    });

    function openEditor(post = null) {
      editorPanel.classList.remove("hidden");
      editorPanel.classList.remove("edit-mode");
      fileInput.value = "";

      if (post) {
        editingId = post.id;
        editorTitle.textContent = "글 수정";
        editorPanel.classList.add("edit-mode");
        const rawType = post.type || "record";
        const mappedType =
          rawType === "meeting" ? "file" :
          rawType === "summary" ? "etc" :
          rawType;
        postType.value = mappedType;
        authorInput.value = post.attendees || "";
        titleInput.value = post.meetingDate || "";
        contentInput.value = post.agenda || "";
        decisionsInput.value = post.decisions || "";

        if (post.file) {
          recordedFileData = post.file;
          updateRecordedPreview(post.file);
          recordStatus.textContent = "첨부 완료";
        } else {
          clearRecordedData();
        }
      } else {
        editingId = null;
        editorTitle.textContent = "새 글 작성";
        postType.value = "record";
        authorInput.value = "";
        titleInput.value = "";
        contentInput.value = "";
        decisionsInput.value = "";
        clearRecordedData();
      }

      updateEditorSections();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function closeEditor() {
      editorPanel.classList.add("hidden");
      editingId = null;
      postType.value = "record";
      authorInput.value = "";
      titleInput.value = "";
      contentInput.value = "";
      decisionsInput.value = "";
      fileInput.value = "";
      clearRecordedData();
      updateEditorSections();
    }

    function updateEditorSections() {
      const type = postType.value;
      const showRecord = type === "record";
      const showFile = type === "record" || type === "file";

      if (showRecord) recordSection.classList.remove("hidden");
      else recordSection.classList.add("hidden");

      if (showFile) fileSection.classList.remove("hidden");
      else fileSection.classList.add("hidden");
    }

    postType.addEventListener("change", () => {
      // 타입 변경 시 첨부/녹음 상태를 초기화
      clearRecordedData();
      recordedFileData = null;
      fileInput.value = "";
      updateEditorSections();
    });

    // =========================
    // 파일 업로드
    // =========================
    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const dataUrl = await fileToDataURL(file);
        recordedFileData = {
          name: file.name,
          type: file.type || getMimeTypeByName(file.name),
          dataUrl
        };
        updateRecordedPreview(recordedFileData);
      } catch (error) {
        console.error(error);
        alert("파일을 불러오는 중 오류가 발생했습니다.");
      }
    });

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function getMimeTypeByName(name) {
      const lower = name.toLowerCase();
      if (lower.endsWith(".pdf")) return "application/pdf";
      if (lower.endsWith(".jpg") || lower.endsWith(".jpeg")) return "image/jpeg";
      if (lower.endsWith(".png")) return "image/png";
      if (lower.endsWith(".webp")) return "image/webp";
      if (lower.endsWith(".mp3")) return "audio/mpeg";
      if (lower.endsWith(".wav")) return "audio/wav";
      if (lower.endsWith(".m4a")) return "audio/mp4";
      return "application/octet-stream";
    }

    // =========================
    // 녹음 기능
    // =========================
    startRecordBtn.addEventListener("click", async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
        alert("이 브라우저는 녹음 기능을 지원하지 않습니다. 파일 업로드를 사용해주세요.");
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) recordedChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          // 녹음 종료 시 타이머 정리
          recordDurationMs = recordStartTs ? (Date.now() - recordStartTs) : 0;
          if (recordTimerInterval) {
            clearInterval(recordTimerInterval);
            recordTimerInterval = null;
          }

          const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || "audio/webm" });
          const ext = blob.type.includes("mp4") ? "m4a" : "webm";
          const file = new File([blob], `recording_${Date.now()}.${ext}`, { type: blob.type });
          const dataUrl = await fileToDataURL(file);

          recordedFileData = {
            name: file.name,
            type: file.type,
            dataUrl
          };

          updateRecordedPreview(recordedFileData);
          recordStatus.textContent = `녹음이 저장되었습니다. 진행시간: ${formatElapsed(recordDurationMs)}`;
          stream.getTracks().forEach(track => track.stop());
        };

        recordStartTs = Date.now();
        recordDurationMs = 0;
        // 1초마다 경과 시간 표시
        recordStatus.textContent = `녹음 중... ${formatElapsed(0)}`;
        recordTimerInterval = setInterval(() => {
          const elapsed = recordStartTs ? (Date.now() - recordStartTs) : 0;
          recordStatus.textContent = `녹음 중... ${formatElapsed(elapsed)}`;
        }, 1000);

        mediaRecorder.start();
        startRecordBtn.disabled = true;
        stopRecordBtn.disabled = false;
      } catch (error) {
        console.error(error);
        alert("마이크 권한이 없거나 녹음을 시작할 수 없습니다.");
      }
    });

    stopRecordBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        startRecordBtn.disabled = false;
        stopRecordBtn.disabled = true;
      }
    });

    clearRecordedBtn.addEventListener("click", () => {
      clearRecordedData();
      fileInput.value = "";
    });

    function updateRecordedPreview(fileObj) {
      if (!fileObj) {
        recordedPreview.classList.add("hidden");
        recordedPreview.src = "";
        return;
      }

      if (fileObj.type && fileObj.type.startsWith("audio/")) {
        recordedPreview.src = fileObj.dataUrl;
        recordedPreview.classList.remove("hidden");
      } else {
        recordedPreview.classList.add("hidden");
        recordedPreview.src = "";
      }
    }

    function clearRecordedData() {
      if (recordTimerInterval) {
        clearInterval(recordTimerInterval);
        recordTimerInterval = null;
      }
      recordStartTs = 0;
      recordDurationMs = 0;
      recordedFileData = null;
      recordedChunks = [];
      recordedPreview.classList.add("hidden");
      recordedPreview.src = "";
      recordStatus.textContent = "대기 중";
      startRecordBtn.disabled = false;
      stopRecordBtn.disabled = true;
    }

    // =========================
    // 저장
    // =========================
    saveBtn.addEventListener("click", () => {
      const type = postType.value;
      const attendees = authorInput.value.trim();
      const meetingDate = titleInput.value.trim(); // yyyy-mm-dd
      const agenda = contentInput.value.trim();
      const decisions = decisionsInput.value.trim();

      if (!meetingDate) {
        alert("회의 날짜를 입력해주세요.");
        return;
      }

      if (!attendees) {
        alert("참석자를 입력해주세요.");
        return;
      }

      if (!agenda) {
        alert("안건을 입력해주세요.");
        return;
      }

      if (!decisions) {
        alert("결정 사항을 입력해주세요.");
        return;
      }

      if (!minutesRef) {
        alert("Firebase 초기화 중입니다. 잠시 후 다시 시도해주세요.");
        return;
      }

      const wantsAttachment = type === "record" || type === "file";
      if (wantsAttachment && !recordedFileData) {
        alert(type === "record" ? "녹음 파일을 저장하거나 파일을 첨부해주세요." : "회의록 파일을 첨부해주세요.");
        return;
      }

      // admin 모드가 아니면 수정/삭제는 막고, 새 글 작성만 허용
      if (editingId && !adminMode) {
        alert("관리자만 수정할 수 있습니다.");
        return;
      }

      const payload = {
        type,
        meetingDate,
        attendees,
        agenda,
        decisions,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      };
      if (wantsAttachment && recordedFileData) payload.file = recordedFileData;
      if (!editingId) payload.createdAt = firebase.database.ServerValue.TIMESTAMP;

      if (editingId) {
        minutesRef.child(editingId)
          .update(payload)
          .then(() => {
            closeEditor();
          })
          .catch((error) => {
            console.error(error);
            alert("수정에 실패했습니다.");
          });
      } else {
        const newRef = minutesRef.push();
        newRef
          .set(payload)
          .then(() => {
            closeEditor();
          })
          .catch((error) => {
            console.error(error);
            alert("저장에 실패했습니다.");
          });
      }
    });

    // =========================
    // 목록 렌더링
    // =========================
    function renderPosts() {
      const keyword = searchInput.value.trim().toLowerCase();
      const typeFilter = filterType.value;

      let filtered = [...posts];

      if (typeFilter !== "all") {
        filtered = filtered.filter(post => {
          if (typeFilter === "file") return post.type === "file" || post.type === "meeting";
          if (typeFilter === "etc") return post.type === "etc" || post.type === "summary";
          return post.type === typeFilter;
        });
      }

      if (keyword) {
        filtered = filtered.filter(post => {
          return (
            (post.meetingDate || "").toLowerCase().includes(keyword) ||
            (post.attendees || "").toLowerCase().includes(keyword) ||
            (post.agenda || "").toLowerCase().includes(keyword) ||
            (post.decisions || "").toLowerCase().includes(keyword) ||
            (post.file?.name || "").toLowerCase().includes(keyword)
          );
        });
      }

      if (filtered.length === 0) {
        postsContainer.innerHTML = `
          <div class="empty">
            등록된 글이 없습니다.
          </div>
        `;
        return;
      }

      postsContainer.innerHTML = filtered.map(post => {
        const typeLabel =
          post.type === "record" ? "녹음" :
          post.type === "file" || post.type === "meeting" ? "회의록(파일)" :
          post.type === "etc" || post.type === "summary" ? "기타" :
          "기타";
        const created = formatDate(post.createdAt);
        const updated = formatDate(post.updatedAt);

        return `
          <article class="post">
            <div class="post-head">
              <div>
                <div class="badge">${typeLabel}</div>
                <h3 class="post-title">${escapeHtml(post.meetingDate || "-")}</h3>
                <div class="meta">
                  참석자: ${escapeHtml(post.attendees || "-")}<br />
                  작성일: ${created}<br />
                  수정일: ${updated}
                </div>
              </div>
            </div>

            ${post.agenda ? `<div class="post-content"><strong>안건</strong><br />${escapeHtml(post.agenda)}</div>` : ""}
            ${post.decisions ? `<div class="post-content" style="margin-top:12px;"><strong>결정 사항</strong><br />${escapeHtml(post.decisions)}</div>` : ""}
            ${renderFilePreview(post.file)}

            ${adminMode ? `
              <div class="post-actions">
                <button class="btn btn-secondary" onclick="editPost('${post.id}')">수정</button>
                <button class="btn btn-danger" onclick="deletePost('${post.id}')">삭제</button>
              </div>
            ` : ""}

            <div class="comments-wrap">
              <div class="section-title" style="font-size:16px; margin:18px 0 12px;">댓글</div>
              <div id="commentsContainer_${post.id}" class="comments-list"></div>
              <div class="comment-form">
                <input
                  id="commentAuthor_${post.id}"
                  class="input"
                  type="text"
                  placeholder="댓글 작성자"
                  value="${escapeHtml(viewerAuthor || "")}"
                />
                <textarea
                  id="commentContent_${post.id}"
                  class="textarea"
                  placeholder="댓글 내용을 입력하세요."></textarea>
                <button class="btn btn-primary" data-comment-add="${post.id}">댓글 등록</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      // 댓글 리스너를 postId별로 한 번만 연결 (DOM 생성 이후)
      filtered.forEach((p) => ensureCommentsListener(p.id));
    }

    function renderFilePreview(file) {
      if (!file || !file.dataUrl) return "";

      const safeName = escapeHtml(file.name || "첨부파일");
      const type = file.type || "";

      if (type.startsWith("audio/")) {
        return `
          <div class="file-preview">
            <div class="meta">첨부파일: ${safeName}</div>
            <audio controls src="${file.dataUrl}"></audio>
          </div>
        `;
      }

      if (type.startsWith("image/")) {
        return `
          <div class="file-preview">
            <div class="meta">첨부파일: ${safeName}</div>
            <img src="${file.dataUrl}" alt="${safeName}" />
          </div>
        `;
      }

      if (type === "application/pdf") {
        return `
          <div class="file-preview">
            <div class="meta">첨부파일: ${safeName}</div>
            <iframe src="${file.dataUrl}"></iframe>
            <div style="margin-top:8px;">
              <a href="${file.dataUrl}" download="${safeName}" class="btn btn-secondary" style="display:inline-block; text-decoration:none;">PDF 다운로드</a>
            </div>
          </div>
        `;
      }

      return `
        <div class="file-preview">
          <div class="meta">첨부파일: ${safeName}</div>
          <a href="${file.dataUrl}" download="${safeName}" class="btn btn-secondary" style="display:inline-block; text-decoration:none;">파일 다운로드</a>
        </div>
      `;
    }

    // =========================
    // 댓글 (Realtime)
    // =========================
    function ensureCommentsListener(postId) {
      if (!minutesRef) return;
      if (commentListeners[postId]) return;

      commentListeners[postId] = true;

      minutesRef.child(postId).child("comments")
        .orderByChild("createdAt")
        .limitToLast(200)
        .on("value", (snapshot) => {
          const raw = snapshot.val() || {};
          lastCommentsByPostId[postId] = raw;
          renderComments(postId, raw);
        }, (error) => {
          console.error("댓글 로딩 오류:", error);
        });
    }

    function renderComments(postId, rawCommentsObj) {
      const container = document.getElementById(`commentsContainer_${postId}`);
      if (!container) return;

      const rawComments = rawCommentsObj || {};
      const comments = Object.entries(rawComments).map(([id, v]) => ({ id, ...(v || {}) }));

      const toMillis = (v) => {
        if (typeof v === "number") return v;
        if (!v) return 0;
        const t = new Date(v).getTime();
        return Number.isNaN(t) ? 0 : t;
      };

      comments.sort((a, b) => toMillis(b.createdAt) - toMillis(a.createdAt));

      if (comments.length === 0) {
        container.innerHTML = `<div class="small-note">댓글이 없습니다.</div>`;
        return;
      }

      container.innerHTML = comments.map((c) => {
        const canEdit = adminMode || (viewerUserId && c.creatorId === viewerUserId);
        const created = formatDate(c.createdAt);

        return `
          <div class="comment-item">
            <div class="comment-meta">
              작성자: ${escapeHtml(c.author || "-")}<br />
              작성시간: ${created}
            </div>
            <div class="comment-content">${escapeHtml(c.content || "")}</div>
            ${canEdit ? `
              <div class="comment-actions">
                <button class="btn btn-secondary btn-sm" data-comment-action="edit" data-post-id="${postId}" data-comment-id="${c.id}">수정</button>
                <button class="btn btn-danger btn-sm" data-comment-action="delete" data-post-id="${postId}" data-comment-id="${c.id}">삭제</button>
              </div>
            ` : ``}
          </div>
        `;
      }).join("");
    }

    function refreshAllCommentsUI() {
      Object.keys(lastCommentsByPostId).forEach((postId) => {
        renderComments(postId, lastCommentsByPostId[postId]);
      });
    }

    // 댓글 등록/수정/삭제 이벤트 (중복 등록 방지: postsContainer 한 곳에서 위임)
    postsContainer.addEventListener("click", (e) => {
      const addBtn = e.target.closest("[data-comment-add]");
      if (addBtn) {
        const postId = addBtn.getAttribute("data-comment-add");
        const authorEl = document.getElementById(`commentAuthor_${postId}`);
        const contentEl = document.getElementById(`commentContent_${postId}`);
        if (!authorEl || !contentEl) return;

        const author = authorEl.value.trim();
        const content = contentEl.value.trim();
        if (!author) {
          alert("댓글 작성자를 입력해주세요.");
          return;
        }
        if (!content) {
          alert("댓글 내용을 입력해주세요.");
          return;
        }
        if (!minutesRef) return;

        viewerAuthor = author;
        sessionStorage.setItem(VIEWER_AUTHOR_KEY, viewerAuthor);

        minutesRef.child(postId).child("comments").push().set({
          author,
          content,
          creatorId: viewerUserId,
          createdAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
          contentEl.value = "";
          refreshAllCommentsUI();
        }).catch((error) => {
          console.error(error);
          alert("댓글 저장에 실패했습니다.");
        });
        return;
      }

      const actionBtn = e.target.closest("[data-comment-action]");
      if (!actionBtn) return;

      const action = actionBtn.getAttribute("data-comment-action");
      const postId = actionBtn.getAttribute("data-post-id");
      const commentId = actionBtn.getAttribute("data-comment-id");
      if (!postId || !commentId) return;
      if (!minutesRef) return;

      const rawComments = lastCommentsByPostId[postId] || {};
      const commentValue = rawComments[commentId];
      if (!commentValue) return;

      const canEdit = adminMode || (viewerUserId && commentValue.creatorId === viewerUserId);
      if (!canEdit) {
        alert("댓글 작성자 또는 관리자만 수정/삭제할 수 있습니다.");
        return;
      }

      if (action === "edit") {
        const next = prompt("댓글을 수정하세요.", commentValue.content || "");
        if (next === null) return;
        const content = String(next).trim();
        if (!content) {
          alert("댓글 내용이 비어있습니다.");
          return;
        }
        minutesRef.child(postId).child("comments").child(commentId).update({ content })
          .catch((error) => {
            console.error(error);
            alert("댓글 수정에 실패했습니다.");
          });
      } else if (action === "delete") {
        const ok = confirm("댓글을 삭제하시겠습니까?");
        if (!ok) return;
        minutesRef.child(postId).child("comments").child(commentId).remove()
          .catch((error) => {
            console.error(error);
            alert("댓글 삭제에 실패했습니다.");
          });
      }
    });

    // =========================
    // 수정 / 삭제
    // =========================
    window.editPost = function(id) {
      if (!adminMode) {
        alert("관리자만 수정할 수 있습니다.");
        return;
      }
      const post = posts.find(p => p.id === id);
      if (!post) return;
      openEditor(post);
    }

    window.deletePost = function(id) {
      if (!adminMode) {
        alert("관리자만 삭제할 수 있습니다.");
        return;
      }
      const post = posts.find(p => p.id === id);
      if (!post || !minutesRef) return;

      const ok = confirm(`"${post.meetingDate || "회의록"}" 글을 삭제하시겠습니까?`);
      if (!ok) return;

      minutesRef.child(id).remove()
        .then(() => {
          if (editingId === id) closeEditor();
        })
        .catch((error) => {
          console.error(error);
          alert("삭제에 실패했습니다.");
        });
    }

    // =========================
    // 검색/필터
    // =========================
    searchInput.addEventListener("input", renderPosts);
    filterType.addEventListener("change", renderPosts);

    // =========================
    // 유틸
    // =========================
    function formatElapsed(ms) {
      const totalSeconds = Math.floor((ms || 0) / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      const hh = String(hours).padStart(2, "0");
      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function formatDate(iso) {
      if (!iso) return "-";
      const d = typeof iso === "number" ? new Date(iso) : new Date(iso);
      if (Number.isNaN(d.getTime())) return "-";
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // =========================
    // 시작
    // =========================
    checkLoginState();
  </script>
</body>
</html>
